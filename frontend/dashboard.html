<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Cloud Gallery</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
</head>
<body data-page="dashboard">
    <header class="topbar">
        <a class="brand" href="/index.html">
            <span class="brand-mark">◉</span>
            <span>Cloud Gallery</span>
        </a>

        <nav class="topbar-links">
            <a href="/gallery.html" data-nav="gallery">Gallery</a>
            <a href="/dashboard.html" data-nav="dashboard" data-admin-only="true" class="hidden">Dashboard</a>
        </nav>

        <div class="topbar-actions">
            <button id="themeToggle" class="btn btn-ghost" type="button">Dark mode</button>
            <button id="logoutButton" class="btn btn-ghost hidden" type="button">Logout</button>
        </div>
    </header>

    <main class="page-shell dashboard-shell">
        <section class="dashboard-layout">
            <article class="panel-card">
                <h2>Upload photo</h2>
                <p>Add a new image with title, caption, location, and people.</p>

                <form id="uploadForm" class="stack-form" enctype="multipart/form-data">
                    <label class="field">
                        <span>Title</span>
                        <input type="text" name="title" placeholder="A stunning sunset" required>
                    </label>

                    <label class="field">
                        <span>Caption</span>
                        <textarea name="caption" rows="4" placeholder="Describe the photo..." required></textarea>
                    </label>

                    <div class="split-fields">
                        <label class="field">
                            <span>Location</span>
                            <input type="text" name="location" placeholder="e.g. Paris, France">
                        </label>
                        <label class="field">
                            <span>People</span>
                            <input type="text" name="people" placeholder="John, Jane">
                        </label>
                    </div>

                    <label class="field">
                        <span>Image</span>
                        <input type="file" name="image" accept="image/jpeg,image/png" required>
                        <small class="hint-text">JPEG or PNG only. Maximum size 5 MB.</small>
                    </label>

                    <button type="submit" class="btn btn-primary">Upload</button>
                    <div id="uploadStatus" class="status-text"></div>
                </form>
            </article>

            <article class="panel-card panel-card-wide">
                <h2>All images</h2>
                <p>Delete any photo from the gallery.</p>
                <div id="dashboardStatus" class="status-text"></div>
                <section id="galleryGrid" class="card-grid"></section>
            </article>
        </section>
    </main>

    <div id="galleryModal" class="modal hidden" aria-hidden="true">
        <div class="modal-backdrop" data-modal-close></div>
        <section class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="galleryModalTitle">
            <button type="button" class="modal-close" data-modal-close aria-label="Close modal">×</button>
            <div class="modal-media">
                <img data-modal-image class="modal-image" src="" alt="">
            </div>
            <div class="modal-body">
                <div class="card-title-row">
                    <div>
                        <h3 id="galleryModalTitle" class="photo-card__title" data-modal-title></h3>
                        <p class="photo-card__caption" data-modal-caption></p>
                    </div>
                    <button type="button" class="delete-button hidden" data-modal-delete>Delete</button>
                </div>

                <div class="meta-grid">
                    <div class="meta-item"><strong>Location</strong><span data-modal-location>Unknown</span></div>
                    <div class="meta-item"><strong>Uploader</strong><span data-modal-uploader>Unknown</span></div>
                    <div class="meta-item"><strong>Likes</strong><span data-like-count>0</span></div>
                    <div class="meta-item"><strong>Average rating</strong><span data-modal-average>No ratings yet</span></div>
                </div>

                <div class="action-row modal-actions">
                    <button type="button" class="like-button" data-like-button data-liked="false">❤️ 0</button>
                </div>

                <form class="inline-form modal-form" data-modal-rating-form>
                    <input type="number" name="rating" min="1" max="5" placeholder="1-5" required>
                    <button type="submit">Rate</button>
                </form>

                <form class="inline-form modal-form" data-modal-comment-form>
                    <input type="text" name="comment" placeholder="Add a comment" required>
                    <button type="submit">Comment</button>
                </form>

                <div class="list-block">
                    <h4>Comments</h4>
                    <div class="list-items" data-modal-comments></div>
                </div>

                <div class="list-block">
                    <h4>Ratings</h4>
                    <div class="list-items" data-ratings-list></div>
                </div>
            </div>
        </section>
    </div>

    <script src="/script.js"></script>
</body>
</html>
