<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Sharing | Consumer View</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <header class="navbar">
        <div class="logo">Cloud Gallery</div>
        <nav>
            <a href="/index.html" class="active">Browse</a>
            <a href="/creator.html">Upload</a>
        </nav>
    </header>

    <main class="container">
        <section class="auth-bar">
            <div id="authSummary" class="auth-summary"></div>
            <div id="authActions"></div>
        </section>

        <section class="hero">
            <h1>Discover Moments</h1>
            <p>Explore beautiful photos uploaded by our creators.</p>
            <form id="searchForm" class="search-bar">
                <input type="text" name="q" class="search-input" placeholder="Search by title, caption, or location">
                <button type="submit" class="btn-sm">Search</button>
                <button type="button" id="clearSearch" class="btn-sm secondary-btn-sm">Clear</button>
            </form>
            <div id="galleryStatus" class="status-msg"></div>
        </section>

        <section id="gallery" class="gallery-grid">
            <!-- Images will be injected here by script.js -->
        </section>
        <section id="pagination" class="pagination"></section>
    </main>

    <script src="/script.js"></script>
</body>
</html>
