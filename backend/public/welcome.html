<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Cloud Gallery</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
    <style>
        .welcome-hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
            text-align: center;
            padding: 2rem;
        }
        .welcome-hero h1 {
            font-size: 3.5rem;
            color: var(--primary);
            margin-bottom: 1rem;
        }
        .welcome-hero p {
            font-size: 1.25rem;
            max-width: 600px;
            margin-bottom: 2.5rem;
            color: var(--text-main);
        }
        .action-buttons {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        .btn-large {
            padding: 1rem 2rem;
            font-size: 1.125rem;
            font-weight: 600;
            border-radius: 12px;
            text-decoration: none;
            transition: all 0.2s ease;
        }
        .btn-primary {
            background-color: var(--primary);
            color: white;
            border: 2px solid var(--primary);
        }
        .btn-primary:hover {
            background-color: var(--primary-hover);
            border-color: var(--primary-hover);
        }
        .btn-secondary {
            background-color: transparent;
            color: var(--primary);
            border: 2px solid var(--primary);
        }
        .btn-secondary:hover {
            background-color: var(--primary);
            color: white;
        }
        .auth-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            width: 100%;
            max-width: 900px;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <header class="navbar">
        <div class="logo">Cloud Gallery</div>
        <nav>
            <a href="/index.html">Browse</a>
            <a href="/creator.html">Upload</a>
        </nav>
    </header>

    <main class="container">
        <section class="welcome-hero">
            <h1>Capture. Share. Relive.</h1>
            <p>Welcome to Cloud Gallery, a simple and beautiful place to store and share your favorite photo memories with the world.</p>
            <div class="action-buttons">
                <a href="/index.html" class="btn-large btn-primary">Browse Gallery</a>
                <a href="/creator.html" class="btn-large btn-secondary">Upload a Photo</a>
            </div>
            <div id="sessionStatus" class="status-msg"></div>
            <div class="auth-grid">
                <div class="card upload-card">
                    <h2>Create Account</h2>
                    <form id="registerForm" class="form-group">
                        <div class="input-field">
                            <label for="registerEmail">Email</label>
                            <input type="text" id="registerEmail" name="email" placeholder="you@example.com" required>
                        </div>
                        <div class="input-field">
                            <label for="registerPassword">Password</label>
                            <input type="password" id="registerPassword" name="password" placeholder="Choose a password" required>
                        </div>
                        <button type="submit" class="btn primary-btn">Register</button>
                        <div id="registerStatus" class="status-msg"></div>
                    </form>
                </div>
                <div class="card upload-card">
                    <h2>Sign In</h2>
                    <form id="loginForm" class="form-group">
                        <div class="input-field">
                            <label for="loginEmail">Email</label>
                            <input type="text" id="loginEmail" name="email" placeholder="you@example.com" required>
                        </div>
                        <div class="input-field">
                            <label for="loginPassword">Password</label>
                            <input type="password" id="loginPassword" name="password" placeholder="Your password" required>
                        </div>
                        <button type="submit" class="btn primary-btn">Login</button>
                        <div id="loginStatus" class="status-msg"></div>
                    </form>
                </div>
            </div>
        </section>
    </main>
    <script src="/script.js"></script>
</body>
</html>
